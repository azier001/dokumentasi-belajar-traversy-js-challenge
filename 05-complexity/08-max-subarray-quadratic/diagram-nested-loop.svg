<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <!-- Outer loop box -->
  <rect x="40" y="20" width="600" height="220" rx="14" fill="#E6F1FB" stroke="#378ADD" stroke-width="1.5"/>
  <text x="58" y="46" font-size="13" font-weight="bold" fill="#0C447C" font-family="sans-serif">Outer loop (i) — pilih titik awal</text>
  <text x="58" y="63" font-size="12" fill="#185FA5">for (let i = 0; i &lt;= arr.length - k; i++)</text>

  <!-- Inner loop box -->
  <rect x="64" y="78" width="552" height="140" rx="10" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="82" y="100" font-size="13" font-weight="bold" fill="#633806" font-family="sans-serif">Inner loop (j) — jumlahkan elemen</text>
  <text x="82" y="117" font-size="12" fill="#854F0B">for (let j = i; j &lt; i + k; j++)</text>

  <!-- Core action -->
  <rect x="88" y="128" width="504" height="52" rx="8" fill="#ffffff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="340" y="150" text-anchor="middle" font-size="13" font-weight="bold" fill="#3d3d3a">currentSum += arr[j]</text>
  <text x="340" y="168" text-anchor="middle" font-size="11" fill="#888780" font-family="sans-serif">tambahkan arr[j] ke currentSum setiap iterasi</text>

  <!-- After inner -->
  <text x="82" y="204" font-size="12" fill="#633806" font-family="sans-serif">Setelah inner loop selesai →</text>
  <text x="244" y="204" font-size="12" font-weight="bold" fill="#633806">maxSum = Math.max(maxSum, currentSum)</text>
</svg>
