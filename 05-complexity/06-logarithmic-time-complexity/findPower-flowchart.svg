<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- START -->
  <rect x="240" y="30" width="200" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="500" fill="#2C2C2A" x="340" y="57" text-anchor="middle">findPower(base, exp)</text>

  <line x1="340" y1="74" x2="340" y2="114" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DIAMOND: exp === 0 -->
  <rect x="220" y="114" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="500" fill="#26215C" x="340" y="137" text-anchor="middle">exp === 0?</text>
  <text font-family="monospace" font-size="11" fill="#534AB7" x="340" y="157" text-anchor="middle">cek base case</text>

  <!-- YES branch: return 1 -->
  <line x1="460" y1="142" x2="556" y2="142" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="monospace" font-size="11" fill="#5F5E5A" x="508" y="134" text-anchor="middle">ya</text>
  <rect x="556" y="114" width="96" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="500" fill="#04342C" x="604" y="137" text-anchor="middle">return 1</text>
  <text font-family="monospace" font-size="11" fill="#0F6E56" x="604" y="157" text-anchor="middle">selesai</text>

  <!-- NO branch down -->
  <line x1="340" y1="170" x2="340" y2="220" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="monospace" font-size="11" fill="#5F5E5A" x="352" y="198" text-anchor="start">tidak</text>

  <!-- DIAMOND: genap? -->
  <rect x="200" y="220" width="280" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="500" fill="#26215C" x="340" y="243" text-anchor="middle">exp % 2 === 0?</text>
  <text font-family="monospace" font-size="11" fill="#534AB7" x="340" y="263" text-anchor="middle">genap atau ganjil?</text>

  <!-- LEFT: genap -->
  <path d="M200 248 L120 248 L120 340" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="monospace" font-size="11" fill="#5F5E5A" x="155" y="240" text-anchor="middle">ya (genap)</text>

  <!-- RIGHT: ganjil -->
  <path d="M480 248 L560 248 L560 340" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="monospace" font-size="11" fill="#5F5E5A" x="525" y="240" text-anchor="middle">tidak (ganjil)</text>

  <!-- BOX: halfPower genap -->
  <rect x="30" y="340" width="180" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="500" fill="#042C53" x="120" y="363" text-anchor="middle">halfPower =</text>
  <text font-family="monospace" font-size="11" fill="#185FA5" x="120" y="383" text-anchor="middle">findPower(base, exp/2)</text>

  <!-- BOX: halfPower ganjil -->
  <rect x="470" y="340" width="182" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="500" fill="#4A1B0C" x="561" y="363" text-anchor="middle">halfPower =</text>
  <text font-family="monospace" font-size="11" fill="#993C1D" x="561" y="383" text-anchor="middle">findPower(base, (exp-1)/2)</text>

  <line x1="120" y1="396" x2="120" y2="446" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="561" y1="396" x2="561" y2="446" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RETURN genap -->
  <rect x="30" y="446" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="500" fill="#04342C" x="120" y="469" text-anchor="middle">return</text>
  <text font-family="monospace" font-size="11" fill="#0F6E56" x="120" y="489" text-anchor="middle">halfPower * halfPower</text>

  <!-- RETURN ganjil -->
  <rect x="470" y="446" width="182" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="500" fill="#04342C" x="561" y="469" text-anchor="middle">return</text>
  <text font-family="monospace" font-size="11" fill="#0F6E56" x="561" y="489" text-anchor="middle">base * halfPower * halfPower</text>

  <text font-family="monospace" font-size="11" fill="#888780" x="120" y="530" text-anchor="middle">jalur genap</text>
  <text font-family="monospace" font-size="11" fill="#888780" x="561" y="530" text-anchor="middle">jalur ganjil</text>
</svg>
