<svg width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Level 0 -->
  <rect x="220" y="20" width="240" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="500" fill="#26215C" x="340" y="42" text-anchor="middle">findPower(2, 10)</text>
  <text font-family="monospace" font-size="11" fill="#534AB7" x="340" y="60" text-anchor="middle">genap → exp/2 = 5</text>
  <line x1="460" y1="46" x2="476" y2="46" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-family="monospace" font-size="11" fill="#3B6D11" x="480" y="50" text-anchor="start">return 32 × 32 = 1024</text>

  <line x1="340" y1="72" x2="340" y2="108" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Level 1 -->
  <rect x="220" y="108" width="240" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="500" fill="#4A1B0C" x="340" y="130" text-anchor="middle">findPower(2, 5)</text>
  <text font-family="monospace" font-size="11" fill="#993C1D" x="340" y="148" text-anchor="middle">ganjil → (exp-1)/2 = 2</text>
  <line x1="460" y1="134" x2="476" y2="134" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-family="monospace" font-size="11" fill="#3B6D11" x="480" y="138" text-anchor="start">return 2 × 4 × 4 = 32</text>

  <line x1="340" y1="160" x2="340" y2="196" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Level 2 -->
  <rect x="220" y="196" width="240" height="52" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="500" fill="#26215C" x="340" y="218" text-anchor="middle">findPower(2, 2)</text>
  <text font-family="monospace" font-size="11" fill="#534AB7" x="340" y="236" text-anchor="middle">genap → exp/2 = 1</text>
  <line x1="460" y1="222" x2="476" y2="222" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-family="monospace" font-size="11" fill="#3B6D11" x="480" y="226" text-anchor="start">return 2 × 2 = 4</text>

  <line x1="340" y1="248" x2="340" y2="284" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Level 3 -->
  <rect x="220" y="284" width="240" height="52" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="500" fill="#4A1B0C" x="340" y="306" text-anchor="middle">findPower(2, 1)</text>
  <text font-family="monospace" font-size="11" fill="#993C1D" x="340" y="324" text-anchor="middle">ganjil → (exp-1)/2 = 0</text>
  <line x1="460" y1="310" x2="476" y2="310" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-family="monospace" font-size="11" fill="#3B6D11" x="480" y="314" text-anchor="start">return 2 × 1 × 1 = 2</text>

  <line x1="340" y1="336" x2="340" y2="372" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Level 4: base case -->
  <rect x="220" y="372" width="240" height="52" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="monospace" font-size="13" font-weight="500" fill="#04342C" x="340" y="394" text-anchor="middle">findPower(2, 0)</text>
  <text font-family="monospace" font-size="11" fill="#0F6E56" x="340" y="412" text-anchor="middle">base case → return 1</text>
  <line x1="460" y1="398" x2="476" y2="398" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <text font-family="monospace" font-size="11" fill="#3B6D11" x="480" y="402" text-anchor="start">return 1</text>

  <!-- Legend -->
  <rect x="30" y="108" width="12" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="monospace" font-size="11" fill="#5F5E5A" x="48" y="119">genap</text>
  <rect x="30" y="128" width="12" height="12" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="monospace" font-size="11" fill="#5F5E5A" x="48" y="139">ganjil</text>
  <rect x="30" y="148" width="12" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="monospace" font-size="11" fill="#5F5E5A" x="48" y="159">base case</text>
</svg>
